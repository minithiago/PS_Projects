<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <meta name="description" content="Portfolio interactivo estilo consola de nueva generación — proyectos de GitHub." />
  <title>Ivan Naranjo — Projects</title>

  <link rel="icon" href="/DefaultAvatar.png" type="image/x-icon" />

  <link rel="preconnect" href="https://api.github.com" />
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <link rel="preconnect" href="https://avatars.githubusercontent.com" />

  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/intro.css" />
  <link rel="stylesheet" href="./src/styles/dashboard.css" />
  <link rel="stylesheet" href="./src/styles/panel.css" />
  <link rel="stylesheet" href="./src/styles/overlays.css" />
</head>
<body>
  <!-- Fondo dinámico cinematográfico -->
  <div id="dynamic-bg" class="dynamic-bg" aria-hidden="true">
    <div class="dynamic-bg__layer" data-layer="a"></div>
    <div class="dynamic-bg__layer" data-layer="b"></div>
    <div class="dynamic-bg__vignette"></div>
    <div class="dynamic-bg__grain"></div>
  </div>

  <!-- Partículas -->
  <canvas id="particles" class="particles" aria-hidden="true"></canvas>

  <!-- Cursor personalizado -->
  <div id="cursor" class="cursor" aria-hidden="true">
    <div class="cursor__dot"></div>
    <div class="cursor__ring"></div>
  </div>

  <!-- ==================== INTRO / BOOT ==================== -->
  <section id="intro" class="intro" aria-label="Arranque">
    <canvas id="intro-particles" class="intro__particles" aria-hidden="true"></canvas>
    <div class="intro__glow"></div>
    <h1 id="intro-name" class="intro__name" data-text="Ivan Naranjo">Ivan Naranjo</h1>
    <div class="intro__line"></div>
    <button id="skip-intro" class="intro__skip" type="button">Saltar intro ›</button>
  </section>

  <!-- ==================== APP ==================== -->
  <main id="app" class="app" aria-hidden="true">
    <!-- Barra superior -->
    <header id="topbar" class="topbar"></header>

    <!-- Filtros / búsqueda -->
    <div id="toolbar" class="toolbar"></div>

    <!-- Carrusel de tarjetas -->
    <section id="carousel-wrap" class="carousel-wrap" aria-label="Proyectos">
      <div id="carousel" class="carousel" role="listbox" aria-label="Lista de proyectos"></div>
    </section>

    <!-- Panel inferior -->
    <section id="panel" class="panel" aria-label="Detalle del proyecto"></section>

    <!-- Pista de ayuda de controles -->
    <footer id="hints" class="hints"></footer>
  </main>

  <!-- Loader -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__ring"></div>
    <p class="loader__text">Cargando proyectos…</p>
  </div>

  <!-- Vista de estadísticas (overlay) -->
  <div id="stats-overlay" class="overlay" aria-hidden="true"></div>

  <!-- Contacto (overlay) -->
  <div id="contact-overlay" class="overlay" aria-hidden="true"></div>

  <script type="module" src="./src/scripts/main.js"></script>
</body>
</html>
